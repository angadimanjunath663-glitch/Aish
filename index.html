<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Surprise for Aishwarya</title>
  <style>
    :root {
      --bg1: #050816;
      --bg2: #0d1022;
      --card: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.14);
      --text: #f5f7ff;
      --muted: rgba(245,247,255,0.75);
      --pink: #ff4fd8;
      --purple: #9b7bff;
      --gold: #ffd86b;
      --red: #ff6b8b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(155,123,255,0.22), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255,79,216,0.18), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(255,216,107,0.12), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    .scroll-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 18px 40px;
      min-height: 100vh;
    }

    .orbit {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(1px);
      opacity: 0.65;
      animation: drift 12s ease-in-out infinite;
      z-index: 1;
    }

    .orbit.one { width: 160px; height: 160px; left: 8%; top: 10%; background: rgba(255,79,216,0.15); }
    .orbit.two { width: 220px; height: 220px; right: 8%; top: 12%; background: rgba(155,123,255,0.12); animation-delay: 2s; }
    .orbit.three { width: 140px; height: 140px; right: 12%; bottom: 10%; background: rgba(255,216,107,0.10); animation-delay: 4s; }

    @keyframes drift {
      0%,100% { transform: translateY(0) translateX(0) scale(1); }
      50% { transform: translateY(-20px) translateX(16px) scale(1.04); }
    }

    .hearts {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
    }

    .heart {
      position: absolute;
      font-size: 18px;
      color: rgba(255, 107, 139, 0.9);
      animation: rise linear infinite;
      text-shadow: 0 0 12px rgba(255,107,139,0.55);
    }

    @keyframes rise {
      from { transform: translateY(0) scale(0.9); opacity: 0; }
      10% { opacity: 1; }
      to { transform: translateY(-120vh) scale(1.5); opacity: 0; }
    }

    .card {
      width: min(92vw, 760px);
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 30px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      padding: 30px;
      position: relative;
      z-index: 2;
      transform-style: preserve-3d;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1rem;
      color: var(--muted);
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    h1 {
      text-align: center;
      font-size: clamp(2rem, 4.8vw, 3.8rem);
      line-height: 1.05;
      margin-top: 6px;
      text-shadow: 0 0 24px rgba(155,123,255,0.18);
    }

    .name {
      text-align: center;
      margin-top: 10px;
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 800;
      background: linear-gradient(90deg, #fff, #ffd86b, #ff4fd8, #9b7bff, #fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      animation: glow 2.4s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 0 rgba(255,79,216,0)); transform: translateY(0); }
      50% { filter: drop-shadow(0 0 18px rgba(255,79,216,0.35)); transform: translateY(-2px); }
    }

    .subtitle {
      text-align: center;
      margin: 14px auto 0;
      max-width: 620px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1.02rem;
    }

    .controls {
      margin-top: 24px;
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.82);
      margin-left: 4px;
      display: block;
      margin-bottom: 8px;
    }

    .date-dropdowns {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      outline: none;
      background: rgba(10,14,28,0.9);
      color: var(--text);
      font-size: 1rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
      cursor: pointer;
    }

    select:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,79,216,0.15);
    }

    .btn-area {
      position: relative;
      height: 74px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .btn {
      position: absolute;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      color: #0d1022;
      background: linear-gradient(135deg, #ffd86b, #ff4fd8);
      box-shadow: 0 14px 30px rgba(255,79,216,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      box-shadow: 0 16px 34px rgba(255,79,216,0.3);
    }

    .status {
      min-height: 28px;
      text-align: center;
      margin-top: 4px;
      color: rgba(255,255,255,0.88);
      font-weight: 600;
    }

    .reveal {
      display: none;
      margin-top: 22px;
      padding: 22px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
      border: 1px solid rgba(255,255,255,0.14);
      overflow: hidden;
      position: relative;
      perspective: 1000px;
    }

    .scene {
      display: grid;
      gap: 16px;
      justify-items: center;
      transform-style: preserve-3d;
      animation: popIn 0.8s ease-out;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateY(22px) scale(0.94) rotateX(12deg); }
      to { opacity: 1; transform: translateY(0) scale(1) rotateX(0deg); }
    }

    .hero-img {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow:
        0 0 0 8px rgba(255,79,216,0.05),
        0 0 40px rgba(155,123,255,0.16),
        inset 0 0 40px rgba(255,255,255,0.04);
      transform: rotateX(18deg) rotateY(-12deg);
      animation: floatCouple 4s ease-in-out infinite;
      margin: 0 auto;
    }

    @keyframes floatCouple {
      0%,100% { transform: rotateX(18deg) rotateY(-12deg) translateY(0); }
      50% { transform: rotateX(18deg) rotateY(-12deg) translateY(-10px); }
    }

    .heart-burst {
      font-size: 2.4rem;
      animation: pulse 1.1s infinite;
      filter: drop-shadow(0 0 14px rgba(255,107,139,0.45));
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.22); }
    }

    .final {
      text-align: center;
      font-size: 1.15rem;
      line-height: 1.8;
      color: rgba(255,255,255,0.94);
    }

    .final strong {
      color: #ffd86b;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.75;
    }

    .sparkles span {
      position: absolute;
      color: rgba(255,255,255,0.9);
      animation: twinkle 2.4s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%,100% { transform: scale(0.7); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    @media (max-width: 640px) {
      .card { padding: 20px; }
      .hero-img { max-width: 280px; }
      .date-dropdowns { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="hearts" id="hearts"></div>
  <div class="orbit one"></div>
  <div class="orbit two"></div>
  <div class="orbit three"></div>

  <div class="scroll-wrap">
    <div class="card">
      <div class="topline">
        <span class="badge">Private Birthday Surprise</span>
        <span>•</span>
        <span class="badge">Made with love</span>
      </div>

      <h1>Tonight is for</h1>
      <div class="name">Aishwarya</div>
      <p class="subtitle">
        I made this just for you — dark, dreamy, and full of love.
        Choose your date, and let me try to win your heart the fun way.
      </p>

      <div class="controls">
        <div>
          <label>Pick a special date (default: today)</label>
          <div class="date-dropdowns">
            <select id="monthSelect"></select>
            <select id="daySelect"></select>
            <select id="yearSelect"></select>
          </div>
        </div>

        <div class="btn-area" id="btnArea">
          <button class="btn" id="moveBtn">Accept Date 💖</button>
        </div>

        <div class="status" id="status">Your date is already set to today. You can change it if you want.</div>
      </div>

      <div class="reveal" id="reveal">
        <div class="sparkles">
          <span style="left:8%;top:14%;">✦</span>
          <span style="left:18%;top:30%;animation-delay:.4s;">✧</span>
          <span style="left:76%;top:18%;animation-delay:.8s;">✦</span>
          <span style="left:88%;top:34%;animation-delay:1.1s;">✧</span>
          <span style="left:22%;bottom:18%;animation-delay:1.5s;">✦</span>
          <span style="left:78%;bottom:16%;animation-delay:1.8s;">✧</span>
        </div>

        <div class="scene">
          <img
            src="static/images/romantic_hug.png"
            alt="Romantic couple hug"
            class="hero-img"
          />

          <div class="heart-burst">💞</div>

          <div class="final" id="finalText"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const hearts = document.getElementById('hearts');
    const btn = document.getElementById('moveBtn');
    const btnArea = document.getElementById('btnArea');
    const monthSelect = document.getElementById('monthSelect');
    const daySelect = document.getElementById('daySelect');
    const yearSelect = document.getElementById('yearSelect');
    const statusEl = document.getElementById('status');
    const reveal = document.getElementById('reveal');
    const finalText = document.getElementById('finalText');

    const months = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    months.forEach((month, index) => {
      const opt = document.createElement('option');
      opt.textContent = month;
      opt.value = index;
      monthSelect.appendChild(opt);
    });

    for (let i = 1; i <= 31; i++) {
      const opt = document.createElement('option');
      opt.textContent = i;
      opt.value = i;
      daySelect.appendChild(opt);
    }

    const currentYear = new Date().getFullYear();
    for (let year = currentYear - 2; year <= currentYear + 3; year++) {
      const opt = document.createElement('option');
      opt.textContent = year;
      opt.value = year;
      yearSelect.appendChild(opt);
    }

    const today = new Date();
    monthSelect.value = today.getMonth();
    daySelect.value = today.getDate();
    yearSelect.value = today.getFullYear();

    let tries = 0;

    function spawnHeart() {
      const el = document.createElement('div');
      el.className = 'heart';
      el.textContent = Math.random() > 0.5 ? '❤' : '💗';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.bottom = '-30px';
      el.style.fontSize = (14 + Math.random() * 24) + 'px';
      el.style.animationDuration = (7 + Math.random() * 5) + 's';
      hearts.appendChild(el);
      setTimeout(() => el.remove(), 13000);
    }

    setInterval(spawnHeart, 280);

    function moveButtonRandomly() {
      if (tries < 2) {
        const maxX = Math.max(0, btnArea.clientWidth - btn.offsetWidth - 12);
        const maxY = Math.max(0, btnArea.clientHeight - btn.offsetHeight - 12);
        const x = Math.random() * maxX;
        const y = 10 + Math.random() * maxY;
        btn.style.left = x + 'px';
        btn.style.top = y + 'px';
        btn.style.transform = 'none';
        tries++;
        statusEl.textContent = tries === 1
          ? 'Oops, too quick 😏 Try again.'
          : 'Still teasing... one more time 💫';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Accepted ❤️';
      btn.style.left = '50%';
      btn.style.top = '12px';
      btn.style.transform = 'translateX(-50%)';
      statusEl.textContent = 'You got it. Now the surprise opens...';
      reveal.style.display = 'block';

      const month = months[monthSelect.value];
      const day = daySelect.value;
      const year = yearSelect.value;
      const picked = `${month} ${day}, ${year}`;

      finalText.innerHTML = `
        <strong>Your date is set in Koramangala with celebration.</strong><br>
        I'll make it warm, pretty, and unforgettable on ${picked}.<br>
        Just you, me, lights, smiles, and a little magic.
      `;
    }

    btn.addEventListener('click', moveButtonRandomly);
  </script>
</body>
</html>
